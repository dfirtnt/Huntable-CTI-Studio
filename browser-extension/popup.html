<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntable CTI Studio</title>
    <style>
        :root {
            --panel-bg-0: #0a0e1a;
            --panel-bg-1: #0f1423;
            --panel-bg-2: #12182a;
            --panel-bg-3: #141c30;
            --panel-bg-5: #1a2238;
            --panel-bg-6: #1e2841;
            --purple-primary: #8b5cf6;
            --purple-hover: #7c3aed;
            --purple-light: #a78bfa;
            --purple-pale: #c4b5fd;
            --purple-border-20: rgba(139, 92, 246, 0.2);
            --purple-border-40: rgba(139, 92, 246, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-muted: #374151;
            --border-subtle: #4b5563;
            --action-execute: #10b981;
            --action-execute-dark: #059669;
            --action-danger: #dc2626;
            --action-info: #3b82f6;
        }

        * { box-sizing: border-box; }

        body {
            width: 360px;
            min-height: 200px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--panel-bg-0);
            color: var(--text-primary);
            font-size: 13px;
        }

        /* ── Header ── */
        .header {
            background: var(--panel-bg-1);
            border-bottom: 1px solid var(--purple-border-20);
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--purple-primary), var(--purple-light), transparent);
        }
        .header-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
        }
        .header-text h1 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }
        .header-text p {
            margin: 2px 0 0 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Content area ── */
        .content {
            padding: 12px 14px;
        }

        /* ── Article card ── */
        .article-info {
            background: var(--panel-bg-2);
            border-radius: 6px;
            padding: 11px 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-muted);
        }
        .article-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
            max-height: 58px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        .article-url {
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all;
            margin-bottom: 7px;
        }
        .article-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .word-count {
            background: var(--panel-bg-5);
            color: var(--purple-light);
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 10px;
            border: 1px solid var(--purple-border-20);
        }

        /* ── Buttons ── */
        .controls {
            display: flex;
            gap: 7px;
            margin-bottom: 10px;
        }
        .btn {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--purple-primary);
            color: #fff;
            border: 1px solid var(--purple-border-40);
        }
        .btn-primary:hover {
            background: var(--purple-hover);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background: var(--panel-bg-5);
            color: var(--text-muted);
            border-color: var(--border-muted);
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: var(--panel-bg-3);
            color: var(--text-secondary);
            border: 1px solid var(--border-muted);
        }
        .btn-secondary:hover {
            background: var(--panel-bg-5);
            border-color: var(--border-subtle);
        }
        .btn-small {
            padding: 4px 8px;
            font-size: 10px;
            flex: none;
        }

        /* ── Status ── */
        .status {
            padding: 8px 11px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 8px;
        }
        .status.success {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status.error {
            background: rgba(220, 38, 38, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .status.loading {
            background: rgba(139, 92, 246, 0.1);
            color: var(--purple-light);
            border: 1px solid var(--purple-border-20);
        }

        /* ── Config panels ── */
        .config {
            background: var(--panel-bg-2);
            border-radius: 6px;
            padding: 11px 12px;
            border: 1px solid var(--border-muted);
            margin-top: 10px;
        }
        .config h3 {
            margin: 0 0 9px 0;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .config label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            display: block;
            margin-bottom: 4px;
        }
        .config input[type="text"],
        .config select {
            width: 100%;
            padding: 7px 9px;
            background: var(--panel-bg-1);
            border: 1px solid var(--border-muted);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-primary);
            margin-bottom: 9px;
            outline: none;
            transition: border-color 0.15s;
        }
        .config input[type="text"]:focus,
        .config select:focus {
            border-color: var(--purple-primary);
        }
        .config input[type="checkbox"] {
            accent-color: var(--purple-primary);
        }
        .config select option {
            background: var(--panel-bg-1);
            color: var(--text-primary);
        }

        /* ── Image list ── */
        .image-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            background: var(--panel-bg-3);
            border-radius: 4px;
            margin-bottom: 4px;
            border: 1px solid var(--border-muted);
        }
        .image-item img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 3px;
            border: 1px solid var(--border-muted);
        }
        .image-item-info { flex: 1; min-width: 0; }
        .image-item-name {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-item-status { font-size: 10px; color: var(--text-muted); }
        .image-item-actions { display: flex; gap: 4px; }

        /* ── Misc ── */
        .hidden { display: none; }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .icon { width: 14px; height: 14px; }

        #image-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        #image-list::-webkit-scrollbar { width: 4px; }
        #image-list::-webkit-scrollbar-track { background: var(--panel-bg-1); }
        #image-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }

        #ocr-section { margin-top: 0; }

        label.inline-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <!-- Inline H-shield icon matching huntable-icon.svg palette -->
        <svg class="header-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="15" fill="#1a1a2e"/>
            <path d="M16 4 L26 8 L26 16 Q26 24 16 28 Q6 24 6 16 L6 8 Z"
                  fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.85"/>
            <rect x="10" y="10" width="2.5" height="12" fill="#a78bfa" rx="0.5"/>
            <rect x="19.5" y="10" width="2.5" height="12" fill="#a78bfa" rx="0.5"/>
            <rect x="10" y="15.2" width="12" height="2" fill="#c4b5fd" rx="0.5"/>
            <circle cx="16" cy="16.2" r="1.8" fill="#8b5cf6" opacity="0.9"/>
            <circle cx="16" cy="16.2" r="0.9" fill="#c4b5fd"/>
        </svg>
        <div class="header-text">
            <h1>Huntable CTI Studio</h1>
            <p>Threat intelligence analysis</p>
        </div>
    </div>

    <div class="content">
        <div id="status" class="status hidden"></div>

        <div class="article-info">
            <div id="article-title" class="article-title">Loading article...</div>
            <div id="article-url" class="article-url"></div>
            <div class="article-meta">
                <span id="article-domain"></span>
                <span id="word-count" class="word-count">0 words</span>
            </div>
        </div>

        <div class="controls">
            <button id="scrape-btn" class="btn btn-primary">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                Send to Huntable
            </button>
            <button id="refresh-btn" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Refresh
            </button>
        </div>

        <div class="config">
            <h3>Configuration</h3>
            <label for="api-url">API URL</label>
            <input type="text" id="api-url" placeholder="http://127.0.0.1:8001" value="http://127.0.0.1:8001">
            <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary);cursor:pointer;">
                <input type="checkbox" id="force-scrape">
                Force scrape (ignore duplicates)
            </label>
        </div>

        <div class="config" id="ocr-section">
            <h3>Image Text Extraction</h3>

            <label for="extraction-mode">Mode</label>
            <select id="extraction-mode">
                <option value="ocr">OCR (local, free)</option>
                <option value="vision">Vision LLM (uses app settings key)</option>
                <option value="hybrid">Hybrid (Vision LLM + OCR fallback)</option>
            </select>

            <div id="vision-config" class="hidden">
                <label for="vision-provider">Provider</label>
                <select id="vision-provider">
                    <option value="openai">OpenAI (GPT-4o Vision)</option>
                    <option value="anthropic">Anthropic (Claude Vision)</option>
                </select>
            </div>

            <button id="extract-images-btn" class="btn btn-secondary" style="width:100%;margin-bottom:8px;">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                Extract Images from Page
            </button>

            <div id="image-list"></div>
            <div id="ocr-status" class="status hidden"></div>

            <label class="inline-check">
                <input type="checkbox" id="enable-ocr" checked>
                Include extracted text in article content
            </label>
        </div>
    </div>

    <script src="tesseract.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
