{% extends "base.html" %}

{% block title %}Job Monitor - Huntable CTI Studio{% endblock %}

{% block content %}
<div class="container mx-auto px-4 pt-4 pb-6">
    <div class="mb-6">
        <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-2"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 19.644l3.181-3.182"/></svg> Job Monitor</h1>
        <p class="text-gray-600 dark:text-gray-400">Monitor Celery background tasks and job queues</p>
    </div>

    <!-- Auto-refresh toggle -->
    <div class="mb-6 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <label class="flex items-center">
                <input type="checkbox" id="autoRefresh" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50" checked>
                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Auto-refresh (5s)</span>
            </label>
            <button id="refreshBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 19.644l3.181-3.182"/></svg> Refresh Now
            </button>
        </div>
        <div class="text-sm text-gray-500 dark:text-gray-400">
            Last updated: <span id="lastUpdated">Never</span>
        </div>
    </div>

    <!-- Worker Status -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="card p-6">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg> Worker Status</h2>
            <div id="workerStatus" class="space-y-3">
                <div class="animate-pulse">
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mt-2"></div>
                </div>
            </div>
        </div>

        <div class="card p-6">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg> Queue Status</h2>
            <div id="queueStatus" class="space-y-3">
                <div class="animate-pulse">
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Tasks -->
    <div class="card p-6 mb-6">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg> Active Tasks</h2>
        <div id="activeTasks" class="space-y-3">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-2/3 mt-2"></div>
            </div>
        </div>
    </div>

    <!-- Recent Job History -->
    <div class="card p-6">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4"><svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg> Recent Job History</h2>
        <div id="jobHistory" class="space-y-3">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mt-2"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mt-2"></div>
            </div>
        </div>
    </div>
</div>

<script>
let autoRefreshInterval;
let isAutoRefresh = true;

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, initializing job monitor...');
    
    // Test if elements exist
    const workerStatus = document.getElementById('workerStatus');
    const queueStatus = document.getElementById('queueStatus');
    const activeTasks = document.getElementById('activeTasks');
    const jobHistory = document.getElementById('jobHistory');
    
    console.log('Elements found:', {
        workerStatus: !!workerStatus,
        queueStatus: !!queueStatus,
        activeTasks: !!activeTasks,
        jobHistory: !!jobHistory
    });
    
    if (workerStatus && queueStatus && activeTasks && jobHistory) {
        loadJobData();
        setupAutoRefresh();
        setupEventListeners();
    } else {
        console.error('Required DOM elements not found');
        showError('Failed to initialize job monitor - missing DOM elements');
    }
});

function setupEventListeners() {
    const autoRefreshEl = document.getElementById('autoRefresh');
    const refreshBtn = document.getElementById('refreshBtn');
    
    if (autoRefreshEl) {
        autoRefreshEl.addEventListener('change', function(e) {
            isAutoRefresh = e.target.checked;
            if (isAutoRefresh) {
                setupAutoRefresh();
            } else {
                clearInterval(autoRefreshInterval);
            }
        });
    } else {
        console.error('autoRefresh element not found');
    }

    if (refreshBtn) {
        refreshBtn.addEventListener('click', function() {
            loadJobData();
        });
    } else {
        console.error('refreshBtn element not found');
    }
}

function setupAutoRefresh() {
    if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
    }
    
    if (isAutoRefresh) {
        autoRefreshInterval = setInterval(loadJobData, 5000);
    }
}

async function loadJobData() {
    try {
        console.log('Loading job data...');
        
        // Load all data in parallel
        const [statusResponse, queueResponse, historyResponse] = await Promise.all([
            fetch('/api/jobs/status'),
            fetch('/api/jobs/queues'),
            fetch('/api/jobs/history?limit=20')
        ]);

        const statusData = await statusResponse.json();
        const queueData = await queueResponse.json();
        const historyData = await historyResponse.json();

        console.log('Status data:', statusData);
        console.log('Queue data:', queueData);
        console.log('History data:', historyData);

        updateWorkerStatus(statusData);
        updateQueueStatus(queueData);
        updateActiveTasks(statusData);
        updateJobHistory(historyData);
        
        const lastUpdatedEl = document.getElementById('lastUpdated');
        if (lastUpdatedEl) {
            lastUpdatedEl.textContent = new Date().toLocaleTimeString();
        }
    } catch (error) {
        console.error('Failed to load job data:', error);
        showError('Failed to load job data: ' + error.message);
    }
}

function updateWorkerStatus(data) {
    const container = document.getElementById('workerStatus');
    console.log('Updating worker status with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div class="text-red-600 dark:text-red-400">❌ Error loading worker status</div>';
        return;
    }
    
    if (data.status === 'timeout') {
        container.innerHTML = '<div class="text-yellow-600 dark:text-yellow-400">⚠️ Worker status timeout - workers may be unresponsive</div>';
        return;
    }

    const workerStats = data.worker_stats || {};
    const activeWorkers = Object.keys(workerStats);
    
    console.log('Active workers:', activeWorkers);
    console.log('Worker stats:', workerStats);
    
    if (activeWorkers.length === 0) {
        container.innerHTML = '<div class="text-yellow-600 dark:text-yellow-400">⚠️ No active workers</div>';
        return;
    }

    let html = '';
    activeWorkers.forEach(worker => {
        const stats = workerStats[worker];
        const processCount = Array.isArray(stats.pool?.processes) ? stats.pool.processes.length : 'N/A';
        const totalTasks = stats.total ? Object.values(stats.total).reduce((a, b) => a + b, 0) : 0;
        
        html += `
            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div>
                    <div class="font-medium text-gray-900 dark:text-white">${worker}</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400">
                        Pool: ${processCount} processes
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-green-600 dark:text-green-400">✅ Active</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">
                        Tasks: ${totalTasks}
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateQueueStatus(data) {
    const container = document.getElementById('queueStatus');
    console.log('Updating queue status with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div class="text-red-600 dark:text-red-400">❌ Error loading queue status</div>';
        return;
    }

    const queues = data.queues || {};
    console.log('Queues:', queues);
    
    let html = '';
    
    Object.entries(queues).forEach(([queueName, length]) => {
        const statusColor = length > 0 ? 'text-orange-600 dark:text-orange-400' : 'text-green-600 dark:text-green-400';
        const statusIcon = length > 0 ? '⏳' : '✅';
        
        html += `
            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div>
                    <div class="font-medium text-gray-900 dark:text-white">${queueName}</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400">Queue length</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold ${statusColor}">${length}</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">${statusIcon} ${length > 0 ? 'Pending' : 'Empty'}</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateActiveTasks(data) {
    const container = document.getElementById('activeTasks');
    console.log('Updating active tasks with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div class="text-red-600 dark:text-red-400">❌ Error loading active tasks</div>';
        return;
    }
    
    if (data.status === 'timeout') {
        container.innerHTML = '<div class="text-yellow-600 dark:text-yellow-400">⚠️ Active tasks timeout - workers may be unresponsive</div>';
        return;
    }

    const activeTasks = data.active_tasks || {};
    console.log('Active tasks:', activeTasks);
    
    const allTasks = [];
    
    Object.entries(activeTasks).forEach(([worker, tasks]) => {
        if (Array.isArray(tasks)) {
            tasks.forEach(task => {
                allTasks.push({...task, worker});
            });
        }
    });
    
    console.log('All tasks:', allTasks);
    
    if (allTasks.length === 0) {
        container.innerHTML = '<div class="text-gray-600 dark:text-gray-400 text-center py-8">No active tasks</div>';
        return;
    }

    let html = '';
    allTasks.forEach(task => {
        const startTime = new Date(task.time_start * 1000).toLocaleTimeString();
        const taskName = task.name ? task.name.split('.').pop() : 'Unknown Task';
        const sourceId = task.args && task.args[0] ? `Source ${task.args[0]}` : 'Unknown Source';
        
        html += `
            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div>
                    <div class="font-medium text-gray-900 dark:text-white">${taskName}</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400">
                        ${sourceId} | Started: ${startTime}
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-blue-600 dark:text-blue-400">🔄 Running</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">ID: ${task.id.substring(0, 8)}...</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateJobHistory(data) {
    const container = document.getElementById('jobHistory');
    console.log('Updating job history with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div class="text-red-600 dark:text-red-400">❌ Error loading job history</div>';
        return;
    }

    const tasks = data.recent_tasks || [];
    console.log('Recent tasks:', tasks);
    
    if (tasks.length === 0) {
        container.innerHTML = '<div class="text-gray-600 dark:text-gray-400 text-center py-8">No recent tasks</div>';
        return;
    }

    let html = '';
    tasks.forEach(task => {
        const statusColor = getStatusColor(task.status);
        const statusIcon = getStatusIcon(task.status);
        const dateDone = task.date_done ? new Date(task.date_done).toLocaleString() : 'N/A';
        const resultText = task.result ? JSON.stringify(task.result).substring(0, 50) + '...' : 'No result';
        
        html += `
            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                <div>
                    <div class="font-medium text-gray-900 dark:text-white">${task.task_id.substring(0, 8)}...</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400">
                        Completed: ${dateDone}
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm ${statusColor}">${statusIcon} ${task.status}</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">
                        ${resultText}
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function getStatusColor(status) {
    switch (status) {
        case 'SUCCESS': return 'text-green-600 dark:text-green-400';
        case 'FAILURE': return 'text-red-600 dark:text-red-400';
        case 'PENDING': return 'text-yellow-600 dark:text-yellow-400';
        case 'RETRY': return 'text-orange-600 dark:text-orange-400';
        default: return 'text-gray-600 dark:text-gray-400';
    }
}

function getStatusIcon(status) {
    switch (status) {
        case 'SUCCESS': return '✅';
        case 'FAILURE': return '❌';
        case 'PENDING': return '⏳';
        case 'RETRY': return '🔄';
        default: return '❓';
    }
}

function showError(message) {
    // Simple error display - could be enhanced with a toast notification
    console.error(message);
    
    // Show error in the UI
    const errorDiv = document.createElement('div');
    errorDiv.className = 'fixed top-4 right-4 bg-red-600 text-white px-4 py-2 rounded-lg shadow-lg z-50';
    errorDiv.textContent = message;
    document.body.appendChild(errorDiv);
    
    // Remove after 5 seconds
    setTimeout(() => {
        if (errorDiv.parentNode) {
            errorDiv.parentNode.removeChild(errorDiv);
        }
    }, 5000);
}
</script>
{% endblock %}
