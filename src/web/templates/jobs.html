{% extends "base.html" %}

{% block title %}Job Monitor - Huntable CTI Studio{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold mb-2" style="color: var(--text-primary);">🔄 Job Monitor</h1>
        <p style="color: var(--text-muted-slate);">Monitor Celery background tasks and job queues</p>
    </div>

    <!-- Auto-refresh toggle -->
    <div class="mb-6 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <label class="flex items-center">
                <input type="checkbox" id="autoRefresh" class="rounded shadow-sm" style="accent-color: var(--purple-primary);" checked>
                <span class="ml-2 text-sm" style="color: var(--text-secondary);">Auto-refresh (5s)</span>
            </label>
            <button id="refreshBtn" class="btn-analyze px-4 py-2 text-white rounded-md transition-colors">
                🔄 Refresh Now
            </button>
        </div>
        <div class="text-sm" style="color: var(--text-muted-slate);">
            Last updated: <span id="lastUpdated">Never</span>
        </div>
    </div>

    <!-- Worker Status -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <div class="rounded-lg shadow p-6" style="background-color: var(--mlops-card-bg); border: 1px solid var(--mlops-card-border);">
            <h2 class="text-xl font-semibold mb-4" style="color: var(--text-primary);">👥 Worker Status</h2>
            <div id="workerStatus" class="space-y-3">
                <div class="animate-pulse">
                    <div class="h-4 rounded w-3/4" style="background-color: var(--panel-bg-4);"></div>
                    <div class="h-4 rounded w-1/2 mt-2" style="background-color: var(--panel-bg-4);"></div>
                </div>
            </div>
        </div>

        <div class="rounded-lg shadow p-6" style="background-color: var(--mlops-card-bg); border: 1px solid var(--mlops-card-border);">
            <h2 class="text-xl font-semibold mb-4" style="color: var(--text-primary);">📊 Queue Status</h2>
            <div id="queueStatus" class="space-y-3">
                <div class="animate-pulse">
                    <div class="h-4 rounded w-3/4" style="background-color: var(--panel-bg-4);"></div>
                    <div class="h-4 rounded w-1/2 mt-2" style="background-color: var(--panel-bg-4);"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Tasks -->
    <div class="rounded-lg shadow p-6 mb-8" style="background-color: var(--mlops-card-bg); border: 1px solid var(--mlops-card-border);">
        <h2 class="text-xl font-semibold mb-4" style="color: var(--text-primary);">⚡ Active Tasks</h2>
        <div id="activeTasks" class="space-y-3">
            <div class="animate-pulse">
                <div class="h-4 rounded w-full" style="background-color: var(--panel-bg-4);"></div>
                <div class="h-4 rounded w-2/3 mt-2" style="background-color: var(--panel-bg-4);"></div>
            </div>
        </div>
    </div>

    <!-- Recent Job History -->
    <div class="rounded-lg shadow p-6" style="background-color: var(--mlops-card-bg); border: 1px solid var(--mlops-card-border);">
        <h2 class="text-xl font-semibold mb-4" style="color: var(--text-primary);">📋 Recent Job History</h2>
        <div id="jobHistory" class="space-y-3">
            <div class="animate-pulse">
                <div class="h-4 rounded w-full" style="background-color: var(--panel-bg-4);"></div>
                <div class="h-4 rounded w-3/4 mt-2" style="background-color: var(--panel-bg-4);"></div>
                <div class="h-4 rounded w-1/2 mt-2" style="background-color: var(--panel-bg-4);"></div>
            </div>
        </div>
    </div>
</div>

<script>
let autoRefreshInterval;
let isAutoRefresh = true;

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, initializing job monitor...');
    
    // Test if elements exist
    const workerStatus = document.getElementById('workerStatus');
    const queueStatus = document.getElementById('queueStatus');
    const activeTasks = document.getElementById('activeTasks');
    const jobHistory = document.getElementById('jobHistory');
    
    console.log('Elements found:', {
        workerStatus: !!workerStatus,
        queueStatus: !!queueStatus,
        activeTasks: !!activeTasks,
        jobHistory: !!jobHistory
    });
    
    if (workerStatus && queueStatus && activeTasks && jobHistory) {
        loadJobData();
        setupAutoRefresh();
        setupEventListeners();
    } else {
        console.error('Required DOM elements not found');
        showError('Failed to initialize job monitor - missing DOM elements');
    }
});

function setupEventListeners() {
    const autoRefreshEl = document.getElementById('autoRefresh');
    const refreshBtn = document.getElementById('refreshBtn');
    
    if (autoRefreshEl) {
        autoRefreshEl.addEventListener('change', function(e) {
            isAutoRefresh = e.target.checked;
            if (isAutoRefresh) {
                setupAutoRefresh();
            } else {
                clearInterval(autoRefreshInterval);
            }
        });
    } else {
        console.error('autoRefresh element not found');
    }

    if (refreshBtn) {
        refreshBtn.addEventListener('click', function() {
            loadJobData();
        });
    } else {
        console.error('refreshBtn element not found');
    }
}

function setupAutoRefresh() {
    if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
    }
    
    if (isAutoRefresh) {
        autoRefreshInterval = setInterval(loadJobData, 5000);
    }
}

async function loadJobData() {
    try {
        console.log('Loading job data...');
        
        // Load all data in parallel
        const [statusResponse, queueResponse, historyResponse] = await Promise.all([
            fetch('/api/jobs/status'),
            fetch('/api/jobs/queues'),
            fetch('/api/jobs/history?limit=20')
        ]);

        const statusData = await statusResponse.json();
        const queueData = await queueResponse.json();
        const historyData = await historyResponse.json();

        console.log('Status data:', statusData);
        console.log('Queue data:', queueData);
        console.log('History data:', historyData);

        updateWorkerStatus(statusData);
        updateQueueStatus(queueData);
        updateActiveTasks(statusData);
        updateJobHistory(historyData);
        
        const lastUpdatedEl = document.getElementById('lastUpdated');
        if (lastUpdatedEl) {
            lastUpdatedEl.textContent = new Date().toLocaleTimeString();
        }
    } catch (error) {
        console.error('Failed to load job data:', error);
        showError('Failed to load job data: ' + error.message);
    }
}

function updateWorkerStatus(data) {
    const container = document.getElementById('workerStatus');
    console.log('Updating worker status with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div style="color: var(--action-danger);">❌ Error loading worker status</div>';
        return;
    }
    
    if (data.status === 'timeout') {
        container.innerHTML = '<div style="color: var(--action-warning);">⚠️ Worker status timeout - workers may be unresponsive</div>';
        return;
    }

    const workerStats = data.worker_stats || {};
    const activeWorkers = Object.keys(workerStats);
    
    console.log('Active workers:', activeWorkers);
    console.log('Worker stats:', workerStats);
    
    if (activeWorkers.length === 0) {
        container.innerHTML = '<div style="color: var(--action-warning);">⚠️ No active workers</div>';
        return;
    }

    let html = '';
    activeWorkers.forEach(worker => {
        const stats = workerStats[worker];
        const processCount = Array.isArray(stats.pool?.processes) ? stats.pool.processes.length : 'N/A';
        const totalTasks = stats.total ? Object.values(stats.total).reduce((a, b) => a + b, 0) : 0;
        
        html += `
            <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: var(--panel-bg-3);">
                <div>
                    <div class="font-medium" style="color: var(--text-primary);">${worker}</div>
                    <div class="text-sm" style="color: var(--text-muted-slate);">
                        Pool: ${processCount} processes
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm " style="color: var(--action-execute);">✅ Active</div>
                    <div class="text-xs" style="color: var(--text-muted-slate);">
                        Tasks: ${totalTasks}
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateQueueStatus(data) {
    const container = document.getElementById('queueStatus');
    console.log('Updating queue status with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div style="color: var(--action-danger);">❌ Error loading queue status</div>';
        return;
    }

    const queues = data.queues || {};
    console.log('Queues:', queues);
    
    let html = '';
    
    Object.entries(queues).forEach(([queueName, length]) => {
        const statusColor = length > 0 ? '" style="color: var(--chart-orange);' : '" style="color: var(--action-execute);';
        const statusIcon = length > 0 ? '⏳' : '✅';
        
        html += `
            <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: var(--panel-bg-3);">
                <div>
                    <div class="font-medium" style="color: var(--text-primary);">${queueName}</div>
                    <div class="text-sm" style="color: var(--text-muted-slate);">Queue length</div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-bold ${statusColor}">${length}</div>
                    <div class="text-xs" style="color: var(--text-muted-slate);">${statusIcon} ${length > 0 ? 'Pending' : 'Empty'}</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateActiveTasks(data) {
    const container = document.getElementById('activeTasks');
    console.log('Updating active tasks with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div style="color: var(--action-danger);">❌ Error loading active tasks</div>';
        return;
    }
    
    if (data.status === 'timeout') {
        container.innerHTML = '<div style="color: var(--action-warning);">⚠️ Active tasks timeout - workers may be unresponsive</div>';
        return;
    }

    const activeTasks = data.active_tasks || {};
    console.log('Active tasks:', activeTasks);
    
    const allTasks = [];
    
    Object.entries(activeTasks).forEach(([worker, tasks]) => {
        if (Array.isArray(tasks)) {
            tasks.forEach(task => {
                allTasks.push({...task, worker});
            });
        }
    });
    
    console.log('All tasks:', allTasks);
    
    if (allTasks.length === 0) {
        container.innerHTML = '<div style="color: var(--text-muted-slate); text-center py-8">No active tasks</div>';
        return;
    }

    let html = '';
    allTasks.forEach(task => {
        const startTime = new Date(task.time_start * 1000).toLocaleTimeString();
        const taskName = task.name ? task.name.split('.').pop() : 'Unknown Task';
        const sourceId = task.args && task.args[0] ? `Source ${task.args[0]}` : 'Unknown Source';
        
        html += `
            <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: var(--panel-bg-3);">
                <div>
                    <div class="font-medium" style="color: var(--text-primary);">${taskName}</div>
                    <div class="text-sm" style="color: var(--text-muted-slate);">
                        ${sourceId} | Started: ${startTime}
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm " style="color: var(--action-info);">🔄 Running</div>
                    <div class="text-xs" style="color: var(--text-muted-slate);">ID: ${task.id.substring(0, 8)}...</div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function updateJobHistory(data) {
    const container = document.getElementById('jobHistory');
    console.log('Updating job history with data:', data);
    
    if (data.status === 'error') {
        container.innerHTML = '<div style="color: var(--action-danger);">❌ Error loading job history</div>';
        return;
    }

    const tasks = data.recent_tasks || [];
    console.log('Recent tasks:', tasks);
    
    if (tasks.length === 0) {
        container.innerHTML = '<div style="color: var(--text-muted-slate); text-center py-8">No recent tasks</div>';
        return;
    }

    let html = '';
    tasks.forEach(task => {
        const statusColor = getStatusColor(task.status);
        const statusIcon = getStatusIcon(task.status);
        const dateDone = task.date_done ? new Date(task.date_done).toLocaleString() : 'N/A';
        const resultText = task.result ? JSON.stringify(task.result).substring(0, 50) + '...' : 'No result';
        
        html += `
            <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: var(--panel-bg-3);">
                <div>
                    <div class="font-medium" style="color: var(--text-primary);">${task.task_id.substring(0, 8)}...</div>
                    <div class="text-sm" style="color: var(--text-muted-slate);">
                        Completed: ${dateDone}
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm ${statusColor}">${statusIcon} ${task.status}</div>
                    <div class="text-xs" style="color: var(--text-muted-slate);">
                        ${resultText}
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function getStatusColor(status) {
    switch (status) {
        case 'SUCCESS': return '" style="color: var(--action-execute);';
        case 'FAILURE': return '" style="color: var(--action-danger);';
        case 'PENDING': return '" style="color: var(--action-warning);';
        case 'RETRY': return '" style="color: var(--chart-orange);';
        default: return '" style="color: var(--text-muted-slate);';
    }
}

function getStatusIcon(status) {
    switch (status) {
        case 'SUCCESS': return '✅';
        case 'FAILURE': return '❌';
        case 'PENDING': return '⏳';
        case 'RETRY': return '🔄';
        default: return '❓';
    }
}

function showError(message) {
    // Simple error display - could be enhanced with a toast notification
    console.error(message);
    
    // Show error in the UI
    const errorDiv = document.createElement('div');
    errorDiv.className = 'fixed top-4 right-4 px-4 py-2 rounded-lg shadow-lg z-50';
    errorDiv.style.cssText = 'background-color: var(--action-danger); color: var(--text-emphasis);';
    errorDiv.textContent = message;
    document.body.appendChild(errorDiv);
    
    // Remove after 5 seconds
    setTimeout(() => {
        if (errorDiv.parentNode) {
            errorDiv.parentNode.removeChild(errorDiv);
        }
    }, 5000);
}
</script>
{% endblock %}
