site_name: Huntable CTI Studio
site_description: Modern threat intelligence collection and analysis platform
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - toc.integrate

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - First Workflow: getting-started/first-workflow.md
  - Concepts:
      - Huntables: concepts/huntables.md
      - Agents: concepts/agents.md
      - Pipelines: concepts/pipelines.md
      - Observables: concepts/observables.md
  - Guides:
      - Add a Feed: guides/add-feed.md
      - Extract Observables: guides/extract-observables.md
      - Edit Agent Prompts: guides/edit-prompts.md
      - Langfuse Setup: guides/langfuse-setup.md
      - Generate Sigma Rules: guides/generate-sigma.md
      - Evaluate Models: guides/evaluate-models.md
      - Backup & Restore: guides/backup-and-restore.md
      - Source Configuration: guides/source-config.md
      - Memory Tuning: guides/memory-tuning.md
  - Architecture:
      - Overview: architecture/overview.md
      - Workflow Data Flow: architecture/workflow-data-flow.md
      - Scoring: architecture/scoring.md
      - Chunking: architecture/chunking.md
      - QA Loops: architecture/qa-loops.md
  - Features:
      - Sigma Detection Rules: features/sigma-rules.md
      - Content Filtering: features/content-filtering.md
      - OS Detection: features/os-detection.md
      - Cmdline Preprocessor: features/cmdline-preprocessor.md
      - RAG Search: features/rag-search.md
      - Observable Evaluation: features/observable-evaluation.md
      - Agent Evals: features/agent-evals.md
  - LLM & Models:
      - Model Selection: llm/model-selection.md
      - Context Window Rationale: llm/context-window-rationale.md
      - Cloud Model Reference: llm/cloud-model-reference.md
      - LM Studio Integration: llm/lmstudio.md
      - Extract Agent Evaluation: llm/extract-agent-eval.md
  - ML Training:
      - Hunt Scoring: ml-training/hunt-scoring.md
      - Database Training: ml-training/database-training.md
  - Reference:
      - CLI: reference/cli.md
      - API: reference/api.md
      - MCP tools: reference/mcp-tools.md
      - Schemas: reference/schemas.md
      - Scheduled Jobs: reports/SCHEDULED_JOBS_REPORT.md
      - ML Feature Definitions: reference/ml-features.md
      - Versioning: reference/versioning.md
  - Development:
      - Agent Orientation: development/agent-orientation.md
      - Setup: development/setup.md
      - Testing Strategy: development/testing.md
      - Manual Testing: development/manual-testing.md
      - Web App Testing: development/web-app-testing.md
      - Debugging: development/debugging.md
      - Database Queries: development/database-queries.md
      - Allure Reports: development/allure-reports.md
      - Multi-Instance: development/multi-instance.md
      - Workflow Queue: development/workflow-queue.md
      - Search Queries: development/search-queries.md
  - Contracts:
      - Extractor Standard: contracts/extractor-standard.md
      - CmdLineExtract: contracts/cmdline-extract.md
      - ProcTreeExtract: contracts/proctree-extract.md
      - RegistryExtract: contracts/registry-extract.md
      - ServicesExtract: contracts/services-extract.md
      - HuntQueriesExtract: contracts/huntquery-extract.md
      - Rank Agent: contracts/rank-agent.md
  - Prompts:
      - Eval Bundle Analysis: prompts/eval-bundle.md
      - Hunt Query Eval: prompts/huntquery-eval.md
      - Process Tree Eval: prompts/proctree-eval.md
  - Solutions:
      - Test failures:
          - Async fixture teardown loop mismatch: solutions/test-failures/async-fixture-teardown-different-loop-IntegrationTests-20260310.md
          - Cmdline extract preset prompt drift (IEX): solutions/test-failures/cmdline-extract-preset-prompt-drift-iex-2026-05-01.md
      - Logic errors:
          - SIGMA similarity case-sensitive atom matching: solutions/logic-errors/sigma-similarity-case-sensitive-atom-matching-2026-04-08.md
          - SIGMA cross-field soft matching zero similarity: solutions/logic-errors/sigma-cross-field-soft-matching-zero-similarity-2026-04-12.md
      - UI bugs:
          - Agent prompt save/display revert race: solutions/ui-bugs/agent-prompt-save-display-revert-AgentPrompts-20260202.md
      - Workflow issues:
          - Agent prompt state refactor recurring save: solutions/workflow-issues/agent-prompt-state-refactor-stop-recurring-save-display-20260311.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
