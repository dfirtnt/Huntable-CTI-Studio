site_name: Huntable CTI Studio
site_description: Modern threat intelligence collection and analysis platform
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - toc.integrate

# Internal working docs (specs/plans) — excluded from the published site;
# they link to source files and are not part of the guided nav.
