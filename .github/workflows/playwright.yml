name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: cti_scraper_test
          POSTGRES_USER: cti_user
          POSTGRES_PASSWORD: cti_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cti_user -d cti_scraper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
      REDIS_URL: redis://localhost:6379/0
      CTI_SCRAPER_URL: http://127.0.0.1:8001
      CTI_EXCLUDE_AGENT_CONFIG_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Initialize test database schema
        run: |
          python - <<'PY'
          import asyncio
          import os
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main():
              os.environ["APP_ENV"] = "test"
              from src.database.async_manager import async_db_manager

              await async_db_manager.create_tables()

              db_url = os.environ["TEST_DATABASE_URL"]
              engine = create_async_engine(db_url)
              try:
                  async with engine.connect() as conn:
                      for table_name in ("sources", "articles", "agentic_workflow_config"):
                          result = await conn.execute(
                              text("SELECT to_regclass(:tbl)"),
                              {"tbl": f"public.{table_name}"},
                          )
                          if result.scalar() is None:
                              raise RuntimeError(f"Missing required table after bootstrap: {table_name}")
              finally:
                  await engine.dispose()

          asyncio.run(main())
          PY

      - name: Start web app
        run: |
          nohup python -m uvicorn src.web.modern_main:app --host 127.0.0.1 --port 8001 --log-level info > web.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "Web app is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Web app did not become healthy in time"
          tail -n 200 web.log || true
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test -c tests/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            allure-results/
            web.log
          retention-days: 30
          if-no-files-found: ignore
