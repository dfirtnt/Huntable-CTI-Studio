name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main, dev-io]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: MkDocs Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --no-group test --no-group dev

      - name: Build docs
        run: uv run --frozen --no-group test --no-group dev mkdocs build --strict

      - name: Debug context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "=== GitHub Context Debug ==="
          echo "event_name=$EVENT_NAME"
          echo "ref=$REF"
          echo "ref_name=$REF_NAME"
          echo "head_ref=$HEAD_REF"
          ls -la | head -20
          ls -la site/ | head -20

      - name: Prepare site structure (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p staging
          cp -r site/* staging/

      - name: Prepare site structure (dev-io)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev-io'
        run: |
          mkdir -p staging/dev
          cp -r site/* staging/dev/

      - name: Upload pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-io')
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging/

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-io')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
