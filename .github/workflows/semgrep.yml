name: Semgrep

on:
  push:
    branches-ignore: [main]
  pull_request:

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        run: >-
          semgrep scan
          --config auto
          --config p/python
          --config p/owasp-top-ten
          --error
          --verbose
          --exclude "scripts"
          --exclude "src/web/static"
          --exclude "src/web/templates"
          --exclude "nginx"
          --exclude "run_tests.py"
          --exclude "site"
          --exclude "docs"
          --exclude "browser-extension"
          --exclude "e2e"
          --exclude "tests"
          --exclude "docker-compose.allure.yml"
