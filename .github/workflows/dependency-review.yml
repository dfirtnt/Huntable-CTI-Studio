name: Dependency Review

on:
  pull_request:

concurrency:
  group: deprev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0-only, GPL-3.0-or-later
          license-check: false
          # GHSA-w8v5-vhqr-4h9v: diskcache 5.6.3 unsafe pickle deserialization;
          # mirrors the pip-audit CVE-2025-69872 ignore. diskcache is used only
          # for local response caching and never deserializes untrusted input.
          allow-ghsas: GHSA-w8v5-vhqr-4h9v
