name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run smoke tests
        env:
          APP_ENV: test
          TEST_GROUP: smoke
          TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
        run: python run_tests.py smoke

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-artifacts
          path: |
            test-results/
            allure-results/
          if-no-files-found: ignore

  api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run API tests
        env:
          APP_ENV: test
          TEST_GROUP: api
          TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
        run: python run_tests.py api

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            test-results/
            allure-results/
          if-no-files-found: ignore
