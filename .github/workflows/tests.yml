name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run pip-audit
        run: >-
          uv run pip-audit
          --skip-editable
          --ignore-vuln GHSA-rf74-v2fm-23pw
          --ignore-vuln CVE-2026-33230
          --ignore-vuln CVE-2026-33231
          --ignore-vuln CVE-2026-4539
          --ignore-vuln GHSA-926x-3r5x-gfhw
        # --skip-editable: sigma-semantic-similarity is a local uv workspace member; not on PyPI
        # nltk: no fixed release for GHSA-rf74 / CVE-2026-33230 / CVE-2026-33231 yet
        # langchain-core GHSA-926x-3r5x-gfhw: transitive dep of langgraph; fix in 1.2.28

      # Optional: add step with pyupio/safety-action and secrets.SAFETY_API_KEY for Safety scan (requires account)

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: cti_scraper_test
          POSTGRES_USER: cti_user
          POSTGRES_PASSWORD: cti_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cti_user -d cti_scraper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      TEST_GROUP: smoke
      TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Start web app
        run: |
          nohup uv run python -m uvicorn src.web.modern_main:app --host 127.0.0.1 --port 8001 --log-level info > web.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8001/health >/dev/null; then
              echo "Web app is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Web app did not become healthy in time"
          tail -n 200 web.log || true
          exit 1

      - name: Run smoke tests
        run: uv run python run_tests.py smoke

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-test-artifacts
          path: |
            test-results/
            allure-results/
            web.log
          if-no-files-found: ignore

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: cti_scraper_test
          POSTGRES_USER: cti_user
          POSTGRES_PASSWORD: cti_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cti_user -d cti_scraper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      TEST_GROUP: unit
      TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run unit tests
        run: uv run python run_tests.py unit

      - name: Enforce unit coverage gates
        env:
          APP_ENV: test
        run: |
          uv run python -m coverage erase

          # Baseline gate for unit-focused runtime code.
          uv run python -m pytest tests/services/ tests/utils/ \
            -m "not integration" \
            --cov=src.services \
            --cov=src.utils \
            --cov-report=term-missing \
            --cov-fail-under=39

          # Package-specific gates to prevent regressions from being hidden by aggregate numbers.
          uv run python -m coverage erase
          uv run python -m pytest tests/services/ tests/utils/ \
            -m "not integration" \
            --cov=src.services \
            --cov-report=term \
            --cov-fail-under=45

          uv run python -m coverage erase
          uv run python -m pytest tests/services/ tests/utils/ \
            -m "not integration" \
            --cov=src.utils \
            --cov-report=term \
            --cov-fail-under=20

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-artifacts
          path: |
            test-results/
            allure-results/
          if-no-files-found: ignore

  api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: cti_scraper_test
          POSTGRES_USER: cti_user
          POSTGRES_PASSWORD: cti_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cti_user -d cti_scraper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      TEST_GROUP: api
      TEST_DATABASE_URL: postgresql+asyncpg://cti_user:cti_pass@localhost:5432/cti_scraper_test
      REDIS_URL: redis://localhost:6379/0
      USE_ASGI_CLIENT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Initialize test database schema
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main():
              os.environ["APP_ENV"] = "test"
              from src.database.async_manager import async_db_manager

              # Ensure extension + ORM tables are created before API tests run.
              await async_db_manager.create_tables()

              db_url = os.environ["TEST_DATABASE_URL"]
              engine = create_async_engine(db_url)
              try:
                  async with engine.connect() as conn:
                      for table_name in ("sources", "articles", "agentic_workflow_config"):
                          result = await conn.execute(
                              text("SELECT to_regclass(:tbl)"),
                              {"tbl": f"public.{table_name}"},
                          )
                          if result.scalar() is None:
                              raise RuntimeError(f"Missing required table after bootstrap: {table_name}")
              finally:
                  await engine.dispose()

          asyncio.run(main())
          PY

      - name: Run API tests
        run: uv run python run_tests.py api

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-test-artifacts
          path: |
            test-results/
            allure-results/
          if-no-files-found: ignore

