name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  check-pinned-versions:
    name: Enforce Pinned Versions
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for unpinned Python versions
        run: |
          python3 - <<'PYEOF'
          import sys, pathlib
          # Only requirements.txt is authoritative for pinned deps.
          # pyproject.toml legitimately uses >= for security-floor transitive pins
          # and TOML key=value syntax would produce false positives in a grep scan.
          unpinned = []
          for line in pathlib.Path("requirements.txt").read_text().splitlines():
            stripped = line.strip()
            if not stripped or stripped.startswith("#"):
              continue
            if ">=" in stripped and "#" not in stripped:
              unpinned.append(stripped)
          if unpinned:
            print("ERROR: Found unpinned versions in requirements.txt (must use == not >=):")
            for u in unpinned:
              print(" ", u)
            sys.exit(1)
          print("All Python dependencies in requirements.txt pinned with ==")
          PYEOF

      - name: Check for unpinned Node versions
        run: |
          set +e
          UNPINNED=$(grep -n '["\^~]' package.json | grep -E '"\^|"~' || true)
          set -e
          if [ -n "$UNPINNED" ]; then
            echo "ERROR: Found caret/tilde ranges in package.json (must use exact versions):"
            echo "$UNPINNED"
            exit 1
          fi
          echo "✓ All Node dependencies pinned with exact versions"

  vulture:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --group dev --no-group test

      - name: Run vulture
        run: uv run vulture src scripts vulture_whitelist.py --min-confidence 80
