version: 2

# Security updates only. `open-pull-requests-limit: 0` disables scheduled VERSION
# updates (routine "bump to latest" PRs) while leaving Dependabot SECURITY-update PRs
# enabled (those are alert-driven, not governed by this limit). Runtime deps are pinned
# exactly and bumped deliberately on the release branch, so version-update PRs are noise.
updates:
  # Python dependencies (covers requirements*.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 0
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # npm dependencies (Playwright test tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 0
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 0
