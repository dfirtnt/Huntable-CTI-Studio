version: 2

updates:
  # Python dependencies (covers requirements*.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 10
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # npm dependencies (Playwright test tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 5
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 5
