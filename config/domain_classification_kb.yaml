# Domain Classification Knowledge Base (Phase D)
#
# Entity -> security DOMAIN(s) for the entity-dimension classifier. Independent
# multi-label: an article can be Identity AND Email AND Cloud at once. A label is
# emitted when its weighted evidence reaches the floor (2.0). Curated seed; extend freely.
# See docs/superpowers/specs/2026-06-19-entity-driven-platform-classification-design.md (Phase D).

entities:
  # --- Identity ---
  - {match: "active directory", labels: [Identity], weight: 2}
  - {match: "kerberos", labels: [Identity], weight: 2}
  - {match: "ntlm", labels: [Identity], weight: 2}
  - {match: "ntds.dit", labels: [Identity], weight: 3}
  - {match: "domain controller", labels: [Identity], weight: 2}
  - {match: "golden ticket", labels: [Identity], weight: 3}
  - {match: "kerberoast", labels: [Identity], weight: 3}
  - {match: "saml", labels: [Identity], weight: 2}
  - {match: "okta", labels: [Identity, SaaS], weight: 2}
  - {match: "entra id", labels: [Identity, Cloud], weight: 2}
  - {match: "azure ad", labels: [Identity, Cloud], weight: 2}
  - {match: "lsass", labels: [Identity, Endpoint], weight: 2}
  # --- Cloud ---
  - {match: "s3 bucket", labels: [Cloud], weight: 2}
  - {match: "ec2 instance", labels: [Cloud], weight: 2}
  - {match: "iam role", labels: [Cloud, Identity], weight: 2}
  - {match: "cloudtrail", labels: [Cloud], weight: 3}
  - {match: "gcp", labels: [Cloud], weight: 2}
  - {match: "kubernetes", labels: [Cloud], weight: 2}
  - {match: "lambda function", labels: [Cloud], weight: 2}
  # --- Network ---
  - {match: "vpn gateway", labels: [Network], weight: 2}
  - {match: "cisco asa", labels: [Network], weight: 3}
  - {match: "pan-os", labels: [Network], weight: 3}
  - {match: "palo alto", labels: [Network], weight: 2}
  - {match: "fortios", labels: [Network], weight: 3}
  - {match: "f5 big-ip", labels: [Network], weight: 3}
  - {match: "netscaler", labels: [Network], weight: 3}
  - {match: "edge appliance", labels: [Network], weight: 2}
  # --- Endpoint ---
  - {match: "sysmon", labels: [Endpoint], weight: 2}
  - {match: " edr ", labels: [Endpoint], weight: 2}
  - {match: "defender for endpoint", labels: [Endpoint], weight: 2}
  - {match: "endpoint detection", labels: [Endpoint], weight: 2}
  # --- Email ---
  - {match: "exchange", labels: [Email], weight: 2}
  - {match: "outlook", labels: [Email], weight: 2}
  - {match: " owa ", labels: [Email], weight: 2}
  - {match: "phishing email", labels: [Email], weight: 2}
  - {match: "mailbox", labels: [Email], weight: 1}
  # --- OT/ICS ---
  - {match: "scada", labels: [OT/ICS], weight: 3}
  - {match: "modbus", labels: [OT/ICS], weight: 3}
  - {match: "ics network", labels: [OT/ICS], weight: 3}
  # --- SaaS ---
  - {match: "salesforce", labels: [SaaS], weight: 2}
  - {match: "github", labels: [SaaS], weight: 1}
  - {match: "slack", labels: [SaaS], weight: 1}
