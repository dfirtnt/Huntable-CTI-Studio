backup:
  compress: true
  directory: backups
  type: full
  verify: true
components:
  config: true
  database: true
  docker_volumes: true
  logs: true
  models: true
  outputs: true
docker_volumes:
  stop_containers: true
  volumes:
  - postgres_data
  - redis_data
environments:
  development:
    backup:
      verify: false
    logging:
      level: DEBUG
    retention:
      daily: 3
      monthly: 1
      weekly: 2
  production:
    backup:
      verify: true
    logging:
      level: INFO
    retention:
      daily: 7
      monthly: 3
      weekly: 4
    security:
      encrypt: true
  testing:
    backup:
      verify: false
    logging:
      level: DEBUG
    retention:
      daily: 1
      monthly: 1
      weekly: 1
logging:
  keep_logs: 30
  level: DEBUG
  log_file: logs/backup.log
  rotate: true
notifications:
  enabled: false
  events:
  - backup_success
  - backup_failure
  - cleanup_completed
  - verification_failed
  methods:
  - email
  - slack
  - webhook
performance:
  chunk_size: 4096
  max_threads: 4
  progress: true
  timeout: 300
retention:
  daily: 7
  max_size_gb: 50
  monthly: 3
  weekly: 4
schedule:
  backup_time: 02:00
  cleanup_day: 0
  cleanup_time: 03:00
security:
  dir_permissions: '0755'
  encrypt: false
  file_permissions: '0644'
  key_file: backup.key
verification:
  checksums: true
  critical_patterns:
    config:
    - '*.yaml'
    - '*.yml'
    - '*.json'
    models:
    - '*.pkl'
    - '*.joblib'
    - '*.h5'
    - '*.onnx'
    outputs:
    - '*.csv'
    - '*.json'
    - '*.txt'
    training_data:
    - '*.csv'
    - '*.json'
  test_restore: false
